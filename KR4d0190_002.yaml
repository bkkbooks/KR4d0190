body:
  text: 東溪集卷下宋髙登撰記象州賢樂堂記趙使君元信守象臺作堂於郡治西偏標名曰賢樂以書來屬僕記之僕以守所樂不以已之樂為樂而以千里之樂為樂珍食爽口樂乎然榖腹不充有啼飢者是吾憂也錦衣華躬樂乎然環堵之陋茅卷風而牀溜雨是吾憂也齁齁髙枕樂乎然潢池之擾刃揮霜而旗耀日是吾憂也彼所謂樂樂乎一已之樂而吾所憂正以千里之未得其樂也惟憂千里之未得其樂是以能使斯民化呻吟而為謳歌然後釋吾憂而與之同樂樂民之樂何樂如之若夫不賢者徒知一己之樂而忘千里之憂則憂將及已是雖有此其能樂也哉故曰賢者而後樂此不賢者雖有此不樂也元信治象二年清修飭已惠愛及人人既得其樂矣身雖處於一堂心常存乎千里則是恤民之深宜享茲樂而無愧焉紹興十有五年冬十二月甲寅漳浦髙登記論窮論夫人固窮然後可以語大事窮則守守則無羡乎達達則約約則猶窮時也一失其達則窮自如也若人也窮達莫得而加損與之有為何往不濟窮則戚戚則必至於達達則侈侈則異窮時也一失其達則窮為纍也若人也窮達變易於初終推其所為何所不至嘗聞莊生之言其窮也使家人忘其貧其達也使王公忘賢而化闕之矣因生之言而知其所謂顔子之賢蓋回於孔門退然若無能人夫子每以王佐期之豈非能固窮然後可與語大事耶考其在陋巷也一簞食一瓢飲此哲人之細事在回若不足道然陋巷之居顔路猶在回也死路嘗請子之車以為槨矣想當時回不獨已能如此往往家人皆能忘貧此其所以為賢而可為王者之佐今之士大夫修身齊家仰事俯育之間使父母妻子于于而樂不以窮為恥而今日之事庶可與議嗚呼難哉忠辨皇朝養士埀二百年一旦金人敗盟京闕失守捐君父如路人奉符璽於異姓者皆平時崇資顯秩之人也獨李公清卿憤褫廢之辱奮然不顧引大義而叱虎狼雖遭哮噬而詈聲強敵與命俱絶想見一時精忠裂眦衝冠干霄貫日凜凜在人耳目間嗚呼古之烈丈夫也而議者謂公之死若未足多兩宫北狩公實主之蓋不得不死耳每聞此語輒為拂膺不懌思之知出於不能死者之口而無識者從而和之不能死者忌人之能死以形已無識者出入其間而不究忠賢之用心夫主憂臣辱主辱臣死兩宫屈辱且見褫廢舉朝之臣宜死之當時如何㮚孫覿亦在君側畏懼蓄縮不敢喘息而徐秉哲王時雍輩方津津以僞命為榮不臣之罪合殱厥族噫不議此之誅而貶公之忠其無公論甚矣太史公曰死非難處死者難若公可謂能處死矣主見虜之謀亦忠於為國屬大勢已去難以口舌爭之不然則草降勸進計不出此耳使聖人復起按春秋而責公之備不過曰雖智不足以存君不忍背君而獨存豈容少貶也耶作忠辨小人議登昨陪祀事獲從台斾出郊見良田沃壤彌漫數里皆為茂草之區因動君子之懷而興小人之喻歎息再三不能已矣若謂君子喻之稼穡播種耘耔一失其宜則不旋踵而槁死小人喻之惡草不種自生去之復蕃况誅鋤之所不及乎此至論也登退念古者諸侯卿大夫皆有爭臣輒不自揆願畢其說知人之難尚矣小人無才不足以資其姦詢之以計則得委之以事則辨故與之有為似若可喜然諂諛邪貪用心委曲無非己利雖能隨時而為俯仰視人而改態度而其謬戾之迹有隙可窺願閣下明察焉無使聰明為之眩蔽則千里赤子庶得以乳其母也不勝願幸幕客議登觀漢竇憲為大將軍請以傅毅為記室崔駰為主簿班固為護軍憲府文章之盛冠於當世唐鄭從讜為招討使表劉崇龜趙崇為制官劉崇魯為推官李渥掌書記崔擇支四時比太原為小朝廷憲從何人乃能收天下之公選使當時議者謂憲府有文章之盛太原有小朝廷之稱而况望隆本朝具瞻所屬言動去取為天下重輕豈可不示之以好惡之公耶蓋今日收拾人才所以備異日為國家用耳固當略去位貌推至誠以交其肺肝俾得以盡胸中藴蓄氣味投議論合然後鸞鳳鴻鵠飛鳴不離其羣倘或狃於人情後寒俊而先貴遊鬱公平而狥私禱緩急不得其力乃有乏才之歎是猶騁駑蹇於修途服騏驥於轅下不知抱駿骨而逺逃者不吾得也伏望台慈奏辟薦舉之際略加考察恐此曹將來為門下之纍人或得而議及焉則於盛德所損非細登别無僥覬之嫌知效誠而已矣取之棄之信之疑之側躬俟命說命諸子名字名字所以相識别未嘗有義自左氏載德命類命之說後世因取義焉如王昶命子以默沉淵深見意於冲虛謙靜謝莊名子以揚朏嵸瀹寓文於風月山水厥趣不同所屬亦異痛念王室凌遲思扶持而一振之左右匡拂以守鴻業然此志未遂天也吾以未遂之志命汝箕曰扶字伯起裘曰持字仲安庭曰振字叔昌桴曰拂字季士人字汝而耳聽之汝稱名而心維之勉效兩全之節無使後笑我昧於諸子而遣蚊負山也戴慥名字戴氏子從父逰宦就學桂林因諸葛故人求名於僕僕謂學者誦先王之言而力行之言而不能行無益也行而或畔於其言不可也故中庸曰言顧行行顧言君子胡不慥慥爾慥之謂造也言行相顧則內外進矣故奉名曰慥字曰子顧所期於吾子將聽其言而信其行可不勉哉三賢不貢獻母后還自女真郡國悉獻典利謂出羡餘而實於常賦外巧為色目以斂之時降詔褒諭汪泉州具表謝云按籍而推未免陽城之拙有金則貢無煩毛伯之求雖不能飄然絶俗然心知其非而輸之矣南來乃得賢守三道州田如鼇昭州林勳容州鄭安恭各以郡小民貧不忍科罰一無所獻嗚呼賢矣哉春秋桓公不書王桓公初二年書王三年不書至十年復書王十一年不書王至十八年復書王說者紛然皆於義未安如孫胡二家謂元年以天道王法正威公之罪二年以天道王法正宋督之罪程氏亦謂弒逆者不以王法正之天理滅矣至說十年十八年則又近鑿考春秋書月則書王不書月不書王明正朔王者之所頒非諸侯可得而自出也於桓公書月而不書王桓公弒隱自立聖人之意微矣元年書王端本故也二年十年十八年書王二百四十二年無十年不書王十年而無王則人道滅矣此春秋之法也不當臆說求封禪封禪非古也其秦漢之侈心乎封聚土也禪除土也祀天地秩山川之禮也賤儒媚附七十二君之說謂告太平之極治曠世盛典學如退之未免有登太山鏤白玉之奏嗚呼若孫宣八奭忠矣史記敘教熊羆貔貅貙虎以戰事如虎如貔如熊如羆以人之鋭喻獸之猛恐泉之師亦如之而史記直謂教熊羆貔貅貙虎以戰蓋遽愛竒而事涉怪不足傳信聖人敘書斷自唐虞良有以也堯不去四凶四凶小人之有才者也堯固知之然重違衆言或舉而姑試之或吁而姑置之功罪未明安得而遽去之至舜然後績用墮矣罪惡彰矣其去之也宜矣史記湯祝網天之生物以養斯人先王仁政所以使之咸若禁其暴殄而已網罟之利以畋以漁尚矣夫網去三面知終日而不獲一也且從而祝之曰欲左左欲右右不用命乃入吾網近類異端之所謂仁非吾聖人之所謂仁曽以湯之懋德如天而為是區區哉後世之君推恩足以及禽獸而功不至於百姓其效此也耶子長愛竒吾所不取東坡像贊尼父兮遭削迹千載兮藏遺履屈伸兮固有時媒蘖兮繄誰子忠義兮滿朝廷文章兮照今古此道兮信未亡先生兮嗚呼死鄒正言像贊噫宋臣姦在古無有元符天子置之左右納君於惡疇其康救公奮不顧乃進苦口殺母取子立嬖廢后欺人則可欺天則不祖宗堯舜陛下桀紂社稷存亡繄陛下手欲謝天下乞斬惇首乃引御衣願終聽受今我來斯實公貶所拜公遺像恨生公後念此後人厥顔何厚洗仁傑為祖雲翼寫真洗子之丹青祖子之儀形髙子謂縱其洗子筆端所傳之妙難狀祖子胸中所藴之誠自寫真贊面兮纎冷髭兮虬卷性兮火烈心兮石堅有誓兮盡敵無望兮凌烟又爾頭甚方爾口甚利以此處世不易不易銘郫筒郫筒出蜀郫縣即杜詩所謂酒憶郫筒不用沽頃得之同舍李紫芝為之銘曰漆豫子之身而無恩可報傾程子之蓋而誰與為友杜爾徑寸之口而警所防一爾終始之節而孤其守孰若與髙子斟酌獻酬而陶陶於無何有也方竹杖其節髙兮曰髙其操堅兮曰堅其中虛兮曰虛其外圓兮曰圓然則胡為而圓今此君能方矣蓋其德也全聽琴橫膝望月倚肩與髙子兮周旋慎獨齊銘靖康初髙子以少故去賢關僦居景德僧寺兀兀終日咄咄書空因揭慎獨顔簷間為之銘云其出户如見賓其入虛如有人其行無愧於景其寢無慚於衾請事斯語無怠厥終祖雲翼思誠齊銘天真無營其於有生如水之清如鑑之明人僞既分喪厥所存如水之渾如鑒之昏性天物理以此揆彼微風不起一塵不生水澄鏡靜乃臻泰定由睿作聖與天地並李生希顔齊銘齗齗洙泗之間從逰至於三千回終日而如愚夫子乃獨稱其賢謂克已以為仁固他人鮮儷焉有若無實若虛過不二怒不遷始而若卓也歎乎髙堅前後終而庶幾也同乎步趨語言惜未達夫一間而天遽奪之年惟徽言與懿行粲日星乎簡編希顔之人亦顔徒視斯銘而勉旃紹興甲子得鄭公介夫硯銘曰我思公不可見如見公以斯硯硯之堅公之剛我之頑雖萬磨而莫變遺諸子硯人以田我以硯遺爾箕意可見扶持振拂各一箕裘庭桴皆小名也朱黃雙硯日月如梭文籍如海討探不及朱黃敢怠行硯世路難人心異惟石交不相棄埋銘耳聵目昏顔雕髮秃有兒歸葬蟠山之麓藏焉息焉以坦我腹深衣銘史彥𨽻先王法服以飭乃躬惟言與行厥戒攸同先生與史彥簡云近作深衣銘欲書之紳幸以十六字寵貴之如佩長者之訓也祖中康辰州人可久可速亦步亦趨周旋中禮仲尼之徒李希旦辰州人莊手重足前後襜如服先王服為君子儒姜巖漳州人忠信篤敬可行蠻貊宜哉書紳務以稱德長子扶非禮勿視非禮勿聽非禮勿言非禮勿動李恪南雄州人有已之私為已之纍克之者誰省之者是羅述容州人才以德將道由道致勿驕勿畫斷無不至缺姓倬賀州人養心莫善間邪以存反身而誠入自仁門盧大榮容州人心存九思身如三省靈源既通物翳自除祖南紀黃州人性習或偏佩韋佩絃務適厥中則罔斯愆李年大名府人學欲自强德宜有力世故糾紛莫回所執李飛英業患不精行患不成宜取四重宜去四輕趙善謨為善最樂作德日休學問無他放心是求蘇鑾泉州人丞相頲之後服以章德學以美身學務知敏德乃日新言針四十無聞一命而傴涉世尤疏多睽少與區區效忠浪費言語盜憎主人怨汝詈汝容州索誥敕昔與今取黃紙白綾兩手分付恰似不曽詞多麗休問世偶然攘臂來逰何須恁乾坤角抵又成冷笑俳優且寬心待他天命謾鼓舌誇吾人謀李廣不封劉蕡下第千年公論合誰羞往矣瓦飄無意甑墮懶回頭真堪笑直鈎議論圓柄機籌幸斯道元無得喪壯心豈有沈浮好溫存困中節槩莫冷落窮裏風流子滴珍珠飯抄雲子醉飽卧信緣休歸去也幅巾談笑卒歲且優遊循環事亡羊須在失馬何憂阮郎歸過武山縣謁許宰不遇作此寄之武仙花縣謁鳬仙急招橫渡船重門晝掩訟庭閒虛簷羣雀喧金屋畔玉欄邊新春桃李妍主人情重客無緣消魂空黯然驀山溪容州病起作黃花時節病惱南來客瘦得不勝衣試腰圍都無一搦東籬興在手種菊闕晚艷泛新芻誰道乾坤窄百年役役樂事真難得短髮已無多更何勞霜風染白兒曹齊健扶起一翁孱龍山帽習池巾歸路從欹側行香子瘴氣如雲暑氣如焚病輕時也是十分沈疴惱客罪罟縈人歎檻中猿籠中鳥轍中鱗休負文章休說經綸得生還已早因循菱花照影筇竹隨身奈沈郎尫潘郎老阮郎貧漁家傲紹興甲子潮州考官作名利場中空擾擾十年南北東西道依舊緑山塵撲帽空懊惱羡他陶令歸來早歸去來兮秋已杪菊花又繞東籬好有酒盈樽開口笑雖然老玉山猶解花前倒好事近黃義卿畫帶霜竹瀟灑帶霜枝獨向歲寒時節觸目千林憔悴更幽姿清絶多才應賦得天真落筆驚風葉從此落花深處有一梢秋月好事近餞别用前韻送客過江村况值重陽佳節向晚西風蕭瑟正離人愁絶尊前相顧惜參商引十分蕉葉回首高陽人散負西樓風月好事近紀别仍用前韻飲興正闌珊正是揮毫時節霜幹銀鈎詩句看壁間三絶西風時地颯秋聲樓外觸殘葉匹馬翩然歸去向征鞍敲月浪淘沙王宰母生日寓居道州勸其來富州璧月挂秋宵丹桂香飄廣寒宫殿路迢迢試問嫦娥緣底事欲下層霄蘭玉自埀髫拜命當朝神仙㑹裏且逍遙分取壺中閒日月來伴王喬西江月渺渺西江流水翩翩北客征帆清秋月影浸人寒雲靜碧天澄淡飄泊道途零落疏慵鬢髮監鬖從來涉世戒三緘只好隨時飲啖南歌子菊撚黃金嫩杯傾琥珀濃良辰何處寄萍蹤短艇飄蓬一葉浪花中鳳闕遊娃館幽坡賞梵宫當年樂事總成空目斷天邊想像意何窮好事近富貴本無心何事故鄉輕别空惹猿驚鶴怨誤松蘿風月囊錐剛强出頭來不道甚時節欲命巾車歸去恐豺狼當轍啓謝賀州張守伯樂去而凡馬空敢希回盼象罔來而𤣥珠得實出無心收録雖後於衆人褒諭特過於常分伏念某稟賦不厚矯拂難勝鐵心石腸誓將堅守奴顔婢膝固所羞為此意太髙於時寡合屬主張於公道肯顧望而詭隨念以直道而事人誠心無愧謂居下流而訕上俗子無知有如皎日之明猶畏爍金之衆慮莫逃於譴黜矧有望於薦掄淺陋曷取其該通戇愚近類乎剛直過情得譽何闕歸思此蓋伏遇知府朝議忠厚持躬清修飭已分憂南服得諸侯之寶三儷美古人有君子之道四煌煌知燭汪汪量波是俾寒微例歸陶冶某謹當俯思勉勵仰稱品題雖拜官於公朝未容私謁既待我以國士敢負深知謝李察院中興賴賢哲勢有急於救焚多故延英髦義莫先於推轂俯收實用仰副虛懷遽及妄庸第深慚感伏念某技窮鼠木仕困漁竿遭鬼揶揄信天拂亂操牛刀於一室忽羊闕之再期善最無聞考宜書於下下賢愚有等人僅品於中中分甘艱險之備嘗敢以功名而自許念從委質憤不戴天區區三户之心碌碌百僚之底梁子徒勞走縣闕嗟十年其如初蕭生不闕行胸懷雖百歲而何益恥深未雪計大難論膂力要及於方剛股掌豈容以久玩黃紬欲曉起運甓之幾回白羽何時遂建瓶之一快天心勿二報國無從切軫贅斿尚希連茹此蓋伏遇提刑察院學通今古言合忠嘉道直時囏行髙衆忌初闕撿闕云李葵安肯來暨覩星旌自謂下惠未可去果䝉識察首預薦揚某敢不勉思經綸貯期奮發取讒人而畀豺虎大開公正之途挽天河以洗甲兵旋致隆平之治東溪集卷下
