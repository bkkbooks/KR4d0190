body:
  text: 東溪集卷上宋高登撰上淵聖皇帝第一書二月十六日太學生臣高登謹昧死百拜上書於皇帝陛下臣戇愚不識忌諱以一布衣之賤論宰相非才敢與策命大臣爭曲直臣罪當萬死然臣所以奮不顧死為陛下言者正以宗社存亡在茲一舉從臣保祿位不肯為陛下言諌官為權勢不敢為陛下言士庶寃憤望闕號呼又從而誣之以為起變亂之禍是陛下聰明已為姦邪所蔽陛下謂能去小人臣知小人日進而得志陛下謂能用君子臣知君子日退而遁身陛下謂能修法度臣知政事日以委靡陛下謂能安黎庶臣知百姓日以怨咨臣知中國之土地日以侵削臣知外夷之甲兵日以強盛臣知祖宗數百年之基業必傾覆於陛下之手臣不勝痛哭今在位食祿者既皆不為陛下扶顛持危而臣欲以區區之簀障江河之流可謂不自量矣臣念䝉被教養十年於茲倘亦隨逐羣隊緘默而去是臣重負陛下臣實不敢愛死臣於今月十二日伏睹黃榜揭示樞密使吳敏劄子洗雪前宰相李邦彥無辜事再欲優加恩禮以超邦彥臣見道路往來之人間有竊笑者有歎息者有揮涕者無不飲恨而去已而次日復聞以吳敏為少師張邦昌以前宰執出使不問有識無識萬口一辭咸曰又如是竊惟陛下自東宫即皇帝位天下之人本以堯舜望陛下意陛下必舉十六相去四凶如堯舜所以為民興利除大害者無何踐阼之始兵革擾攘朝廷政事一切未暇議人又翹首拭目以待事息而睹維新之政大旱望霓莫此為急奈何陛下首納敏黨與之言且以布告中外意在復用邦彥而又以敏邦昌為相是陛下大失天下之望臣恐人心自此離矣夫邦彥等姦邪閭閻細人能言之臣不復縷條冒瀆天聽祗以太上皇處之政府如是其久坐視天下安危猶越人視秦人之肥瘠引小人而加膝擠君子於深淵綱紀紊亂民庶愁怨方且日以治安之言誘誤上皇以致昨日之禍上皇引咎歸已遜位陛下蒼黃南幸不獲寧居主辱臣死此曹當盡伏誅今且偃然自恣尚欲朋比為姦䝉蔽天日傳曰觀近臣以其所主以敏之力主邦彥則敏亦一邦彥耳使敏而有識知邦彥之姦邪是敏欺陛下是敏之大不忠其罪又非邦彥比敏自策命一事以後不能有所建明人猶以守正之士期之今而如是則敏之品一旦掃地然陛下從敏之請天下之人不惟歸罪於敏且以陛下為不明之君臣故恐大失天下之望人心自此離矣陛下若以敏有策立之功寵之上相是陛下報一已之私恩而不以宗廟社稷為念也陛下胡不虛相位以待賢者之來如徐處仁如唐恪如馮澥如黃琮如黃次山如祖秀實大可以處之政府小可以列之諌垣凡今侍從左右近臣亦皆知此數人才德然不肯為陛下引用者恐其獲用不利於已耳陛下能聽臣言乞賜俯詢侍從彼雖嫉之如仇然亦不敢厚誣以為全無能也詢黃琮則於曽蒞福建任者不然則凡福建人皆知之詢馮澥則於曽厯四川任者不然則凡四川人皆知之黃次山祖秀實則賢關素所推服不患不知如徐處仁唐恪果已見其設施矣臣意陛下在東宫時亦嘗與有識評裁當世人物其可與否素已若白黑於胸中若此數人固當不次擢用前之數輩宜陛下平昔之所切齒者今反顛倒如是蓋當正始之際何乃遽為姦人昏惑一至於是耶臣前日見陛下追贈司馬光范仲淹張商英以三公之爵私竊自喜謂於往者猶興慕况來今乎然自今觀之則知陛下雖得光等亦不能用也夫以一李綱在陛下左右陛下諳悉其忠誠尚不能篤意委任而况疏逺之人一為奸人沮毁陛下其肯信之哉邦彥邦昌敏等陛下付以鈞衡使之升黜人才則他日援引而進者亦皆此徒也列於庶位果得俊乂而用之乎臣聞賢而有識者皆以宗社之存亡卜於陛下之置相今置相止於邦彥邦昌敏等則是存亡已判矣此臣所以激切而奔告於陛下也臣又聞金人攻圍都城之日羣姦力沮种師道李綱之謀割二祖陵寢之地以啖之國人聞者無不埀涕既而相謂曰廣地不若廣田强兵不若强民以吾君之仁聖鋭意治道必能任用君子黜退小人修舉政事撫綏黎庶雖無三關猶可治也異日百蠻向風四夷效順復中國之境土殆有可期奈何事息之後小人之勢愈焰而君子之道冷猶灰燼觀望陛下之意惟取一二法度而更張之不能度時之宜適以遺害天下雖日務行姑息之政臣恐弗孚於民而民弗之懷也政恐宗社之不復福在於敵國而不在於陛下善乎蘇軾之言曰用君子如植嘉木封培之甚難而去之甚易用小人如長惡草不種自生去之復蕃以言小人之易見信任而君子之易見疏逺也昔漢元帝承宣帝之後好賢不堅惡惡不著知蕭望之周堪張猛之為賢任之且二而弗專知宏恭石顯之為惡去之且疑而弗决卒焉小人道長而高祖之業自此以衰夫元帝承宣帝之後猶爾况陛下承此衰敝之餘必欲振起中興之業不能拔擢四方之君子不能斥退在朝之小人日為此輩昏惑臣恐宗社傾覆而陛下猶不知也臣於彼時雖欲為陛下言之已無及矣臣老母年六十餘别無兄弟侍養而臣又不沾陛下一命之寵偷活歸耕於勢當然而乃不避斧鉞願效忠者今日之事存亡所係萬一陛下肯聽臣言則我祖宗基業可以永保無虞而臣雖殺身破家固亦無恨已臣素不喜文章詞不足以明意臣自知戇愚罪當萬死臣不勝俯伏流涕待罪之至臣登百拜第二書二月二十二日闕第三書三月初一日太學生臣高登謹昧死百拜上書於皇帝陛下臣聞食人之食者死人之事臣坐蠧國家廩儲十有餘年於此矣義當效死以報陛下臣於二月十六日曽詣登聞檢院上書論列李邦彥張邦昌吳敏姦邪等事待罪旬日不䝉賜報又於二十二日上書獨論敏不可為相事書至再上繼亦無報臣竊疑之果陛下之聖明耶即宜奪敏權要若陛下之昏庸也亦當賜臣誅戮且敏之用與不用臣言之聽與不聽陛下之聖明與昏庸宗社之存亡實係於此臣所以曉夕皇皇不敢愛死再竭愚衷而卜於陛下也臣請極言之商太甲之始即位也不明於德賴一伊尹而卒能中興唐明皇之始即位也勵精求治相一李林甫而終致禍亂今陛下始即寶位有太甲之不明而朝無阿衡昧明皇之有初而遽相林甫臣不勝為宗廟社稷痛哭人常以古為鑑而陛下不能以今為鑑則其不明莫甚也臣所以懇切為言民心復離之說者前此太上皇朝此曹皆列侍從不能有所糾拂逢君之惡結怨天下故睦賊一匹夫耳奮臂一呼閭閻細民有尊之為方佛者有尊之為方聖人者則其民心之離可知矣然是時民心雖離且不至於敗亡者民猶有所屬望耳又比金人兵至直北都城居民惶懼欲就死無所凡在位食祿者輒先衆人而遁其民心之離又可知矣然是時民心雖離亦不至於敗亡者民猶有所屬望耳蓋為陛下在東宫十有餘年民心之所屬望者久矣意陛下龍飛克霈大澤於天下一洗而新之以慰雲霓之急奈何陛下不以前日禍亂為鑒而乃以民心之所痛憤者列之上位雖日務行姑息之政臣恐人心不屬自此復離矣且昔者離心猶有屬望今既失所素望矣一旦中原有變如睦賊之奮臂者戎馬犯邉如金兵之深入者陛下獨能守此祖宗宗廟社稷否此曹計亦先衆人而遁也陛下何至拂億兆黎庶之公心顧一二大臣之私恩而不以宗廟社稷為念也陛下雖無太甲之縱欲敗禮而賢否莫辨治亂不分其不明有甚焉今日之事不可少緩伏願陛下早回聖志即罷敏邦昌為相兼黜逐趙野李稅王孝迪王時雍之徒凡在上皇朝久居侍從而無所遷涉者皆不忠之臣也仍乞速召徐處仁到以上相之位待之臣前書乞召唐恪馮澥黃琮黃次山祖秀實今亦望加大用且以播告四方一新民之耳目然後內修政事外攘戎狄可以大有為於天下矣不然則兵革方興敗亡無日臣亦不知其死所矣陛下必以臣為狂妄觸犯君上凌訕大臣賜臣斬首於市猶愈死於亂兵之手耳不勝激切俯伏流涕待罪之至臣登百拜第四書三月二十二日太學生臣高登謹昧死百拜上書皇帝陛下臣先於二月十六日嘗詣登聞檢院論列李邦彥張邦昌吳敏不可為相事乞逐趙野李稅王孝迪王時雍之徒拔擢徐處仁等既而書之上七日不䝉睿斷施行臣恐陛下復為姦邪蔽欺曉夜皇皇寢食俱廢遂於二十二日再詣檢院獨論吳敏庸邪事伏乞與趙野等例行竄黜兼速召處仁以下六人既而書之上九日又不䝉睿斷施行臣於是時五內傷割幾欲自斃誓以微軀力回聖志故三月一日臣所上書詞意鯁訐自分罪當萬死而陛下察臣知區區之誠不能自達坐蠧太倉臣實愧恥方圖南下之計遽聞邦昌邦彥各與逺郡而稅野孝迪繼斥出之處仁正台司恪列政府澥職諫諍臣之所言偶符臣不勝自喜自慰然臣猶疑陛下未可謂不二不疑者所可棄二人而陛下不忍棄所可用三人而陛下不肯用吳敏庸邪尚居宰輔時雍奸佞猶尹開封黃琮方正卒於小郡次山剛介録事學官秀實學行優純得一博士而猶罷去謂陛下謹惜名器耶何敏時雍可惜而不惜也謂陛下任用賢才耶何琮次山秀實可用而不用也臣疑餘風未殄尚有蔽賢援黨之人而陛下不知也陛下意敏等雖不即罷未害於事琮等雖即用未益於事臣甚以為不然陛下知士民紛紛危疑之論乎他時害事未必不由此曹而出力以當此者未必不由琮等願早圖之毋貽日後悔也臣論士民紛紛危疑之論者臣於今月十九日剽聞行道之人曰官家欲啓宣德門迎皇太后共聽政事臣時聞之笑與同行者語謂自堯舜三代以自漢晉隋唐閲古無之豈我祖宗積纍數百年而一旦生此亂亡之事哉臣堅不肯聽而衆心猶疑未解越翼日偶得職方員外郎龔瑞劄子臣始驚愕讀未終篇而魂魄幾去體矣噫此事果有之耶抑出於妄傳者耶臣意必無此也若果有之是安得此也其出於陛下之意耶將奸人造端以致亂耶出於陛下之意是陛下不曽讀古書不曽求古道不知所謂宗廟不知所謂社稷不知所謂天下而輕舉妄動也舉朝之臣皆有罪矣若出於太后之意則是上皇之意也臣不忍復言矣自昨日道路之說一行龔瑞之書一出士民之心不勝寃恨皆願效死於闕前以爭今日之事嗚呼戒之謹之毋輕舉妄動也或者又曰陛下天資仁孝昨日之事乃謙遜也此亦唐肅宗故事臣竊以為不然肅宗之事與陛下事迥異耳肅宗治兵靈武自立為帝今陛下親受詔㫖代即寶位天意人心允歸陛下又何遜之云乎萬一陛下果有此意而上皇太后未能息心臣恐禍稔蕭牆釁生幃幄殆非宗廟社稷之福也臣愚伏望陛下乾剛果決無所牽制以天下生民為心臣不勝幸甚臣以一布衣言及此事臣罪當萬死臣無任伏地泣涕以待斧鉞之至不宣臣登百拜第五書五月十一日漳州進士臣高登謹昧死百拜上書於皇帝陛下臣自今年二月以來數封章痛切為陛下陳存亡大計臣戇愚無所隱避忤陛下多矣賴陛下天地涵容不忍遽賜誅戮臣當守分緘默務全腰領今不自遁戢復以瞽言干冒天威臣知陛下必恕臣言而臣亦不敢逃死臣觀今日之勢審如賈誼所謂積薪火已及燃矣然臣復願焦體膚熱毛髮持杯水以進焉臣知陛下必怒臣言者良以陛下不能受盡言故也臣謂厥今天下之勢姑曰火已及然矣過此而不救則不但積薪之比直猶燎鴻毛於爐炭之上果何所有哉臣非敢妄為危言恐動陛下理勢昭然顧不之加察耳臣乞陛下先罷吳敏為相臣當繼有所陳陛下若以書生高臣已愧於心矣亦無負國家十年教養矣願陛下以社稷生靈為念毋忽臣無任俯伏流涕之至不宣臣登百拜上皇帝書紹興八年臣聞富家祖宗辛勤積纍衣護一絲食惜一粒以致家道之肥而遺其子孫子孫生則見田疇之富牛羊之蓄金帛之多第宅之雄故用度隨以奢大嵗時享祀男女婚嫁賓客宴㑹鄉閭饋遺各有其儀不可得而約也不如是不足以稱所有故也無何禍倚之而衰乘之成於百年壞於一朝向之田疇鬻之無幾矣向之牛羊散之無幾矣向之金帛費之無幾矣向之第宅破敝頺倒可以支吾又無幾矣水火盜賊迫逐遷徙靡遑寧居比向之富厚安逸固相萬萬而享祀婚嫁宴㑹饋遺其儀尚存雖竭力營辦務為可觀臣知家道索矣嗚呼賢子若孫為起家計則如之何當念祖先積纍之難而壞之如此其易視今所入與向孰多視今患難孰與向之無事一切削去常儀粗糲是甘櫛沐為勞夫課奴耕婦勤婢織閔閔焉望其成聚始有則曰茍合少有則曰茍全富有則曰茍美田疇旋復墾闢牛羊旋復字育金帛旋復蓄藏第宅旋復修創其能復祖宗之業而興其家無他懲所損而勉所益耳恭惟藝祖太宗致王業之艱難如富家積纍以遺子孫列聖紹服治享隆平禮文備舉如家富子孫見榮盛而處安逸用度稱之曽未為過宣平之末禍生強敵邀我兩宫驅我人民據我土地如富家衰替田宅財蓄所存無幾賢子若孫為起家計允屬陛下伏自陛下即位以來視時之宜以因以革雖隨事裁損然政事之大宜罷行者相臣於今幾中易矣類多持茍且之心行姑息之政噫使人懲朝氏之危孰與安劉氏哉主威不振國命益微因循委靡日復一日臣恐中興之期尚勞宸慮正如家道衰替一或有所減約則恐家人臧獲不厭所欲而生怨歎之心如是而欲為起家計亦難矣時議六篇序臣聞不樂因循而憚改作然後可與有為不喜軟熟而忌切直然後可與盡忠故古人之事君也量而後入仰惟陛下鼎新庶政謙受讜言宵旰皇皇惟恐宿弊之未盡除而下情之未上達此微臣得以竭其愚而不知其他也臣觀政治之大方今最急者不過曰賢才未用國計未足兆庶未寧賢才未用有蔽主者焉二府多充位之臣盈廷多罔上之議是也作蔽主上下篇國計未足有蠧國者焉太倉耗冗食之兵良田贍游手之民是也作蠧國上下篇兆庶未寧有害民者焉冗官起貪殘之念募役長殘賊之奸是也作害民上下篇論蔽主期以悟主論蠧國期以益國論害民期以安民惟陛下不以人廢言非獨微臣之幸實社稷天下之幸也上書乞納官贖罪歸葬親臣聞勞苦則呼天疾痛則呼父母窮而返本人之至情也臣母死船中倉皇遭捕勞苦疾痛可謂極矣所以萬里倍道自縳詣闕大其聲而疾呼仰惟皇帝陛下天臨九有子育羣生伏兾聞聲埀慈許臣納官自贖歸葬其親則人無憾於喪死王道之大實始於此伏念臣備位古邑謹亷勤公仁之寄奉以周旋亦既二年民頗悅之父老投牒請留區區積誠粗有可紀惟是風俗未淳正以豪强為害懲一勸百大快神人之憤禍由惡積邂逅致死攸司究覆别無非理㑹恩原結具聞於朝緣臣稟賦不厚矯操難勝終坐真情取怒上㫖洗垢百端無瑖可指輒援前事易臣二令臣母年八十病日以危遽罹不幸死非其所臣哀號隕絶莫知稟待迤邐扶喪欲即海道怒臣者特為已甚劾以擅去得㫖根勘捕臣愈峻君命所逮臣心敢違臣自念譬委肉餓虎之溪燎毛洪爐之上或軍卒橫加凌辱臣必死於道途或官司有所觀望臣必死於囹圄意外羅織何所不至以臣一介之微固不足恤重念臣母家貧早喪先臣止攜一子績麻鬻資給臣為學雖晚年見臣獲第然官小祿薄未酬孝養狼狽遐方死於患難奉葬無人孤魂無依况臣幸遇中興之主立賢無方孝治之廣刑於四海寧肯棄士於怒者使得而甘心又寧忍視為人之子而不得以為母服耶孰若歸命闕廷控告君父伏望聖慈惻然軫念察臣罪犯即無贓私憐臣母死尚茲暴露免臣更赴靜江勘所命回渙汗恩復骨肉願言罔極而欲報倘遂終喪敢謂宜闕而反闕分甘永棄則是駒犢之慕重於鼷鷃之樂明矣誓畢縷縷期達天聽臣又聞昔有投巫水中而人不以為專殺蓋其情本於除害有矯駕君車而人不以為犯法蓋其情出於為親臣書生耳知信紙上之語闕稽古典則罪固難逃論人情則理或可恕哀迷迫切言淺不文干冒天威退俟斧鉞詩還山招陳希韓乾坤莽回互日月相蕩摩百年才瞬息萬類總么麼是身非吾有造物如我何觸事㑹心少幽棲廢興多眷言意所適樂此山之阿修篁擢新幹老木榮舊柯谷聲傳地籟松韻答天和獨石介而安寒泉淡無波園蔬掇纎嫩名果仍駢羅紅綻著雨花碧卷受風荷隨意坐莓苔絺衣掛薜蘿得酒即酩酊作詩苦吟哦嘯長情浩蕩舞短影婆娑妻奴鹿門趣黃綺商山歌﨑嶇路辭遙迢遞誰見過交親憶同調出處矢靡他每憐傷弓禽因感赴燭蛾無心更闕試藝趂投戈自覺此身浮相看雙鬢皤人事何時休歸來勿蹉跎偕學子遊都嶠紹興十四年秋九月乙巳高登以罪竄容州眀年春戊午到竄所冬十一月壬戌遊都嶠學子李彌章盧大勳李飛英李瑞禮羅述蕭巖黃宗之男扶持從遊甲子歲秋杪負罪西南馳腳厯山萬重身墜天一涯茅茨蔽聚落培塿圍孤埤何處有洞天𤣥真之所栖維南頗挺拔隱隱浮修眉采菊東籬下悠然一見之欲往覺旌搖兀坐嗟黏黐彼美二三子知我多愛竒闕登翠微天公喜我來閣雨雲埀埀坤靈喜我來林壑回春姿山禽喜我來上下鳴嚶咿江梅喜我來蓓藟敷南枝高興闕幽尋絶闕如許鬱葱瑣煙闕誰遣衢聃徒列此怪狀為闕馮賢主人痛闕彌年非我生逢百罹不慕太廟犧况從奪袍簡欣若脫馬羈投荒得勝踐闕與闕分宜清芬追六逸餘齡寄三危明時甘自誓敢闕詞暫遊已難得短略仍易移山腳趣回馭闕意默契欲下思懼遲準擬供冥搜草木闕氣知多少凄入詩人脾暮途雙徑松歸馬四闕出沒山光裏烏帽風披披歸途歎孫吳攄將略申甫翰王家腐儒要底用歸種東陵瓜自嘆平生無技能素業闕世期躋唐虞憤嘗獻瞽言闕寧憚攀虎鬚由此隔闕束如囚拘索米無處闕漫不分賢愚梁竦知徒勞淵明奈闕書獄訟簡沈迷昡鉛朱闕窗几羅蛛絲簡編殘思歸忽忽已秋杪言歸欣有期節物想吾廬青蕊繁東籬流匙白雲子蘸甲黃鵝兒對此憶羈旅多應歌式微喜慰倚門心愁消舉案眉稚子閙簷隙繞膝牽人衣歸興念如許兼程猶苦遲明朝秋色裏烏帽風披披似春閣二閣寧獨暖萬家方號寒何當放春去和氣滿人間留别丈夫四方志肯作兒女别顧我差崛强羡君真秀發道義重千鈞利名輕一葉壯風吐虹霓忠誠貫日月插劒露肝膽看鏡念勳業何當拔茅茹同在陳力列冒寒行風雨有感號風撼枯枿凍雨凝路塵乾坤祕日月八荒同一雲遙知沙漠寒黯淡愁殺人天涯望不極流涕滿衣巾陳少陽贈官憶昔靖康初厄運㑹中微嚴禁弛邊備長驅來健兒堂堂搗京闕百萬呼鼓鼙天地為改色日月晴晦迷當寧猶未悟聰明遭蔽欺六賊久盤結如山屹莫移故人陳夫子忠闕根資拊髀惜機㑹禍端良在茲吾儕沐厚澤顛危合扶持不聞王蠋賢絶脰由布衣書成數千言揮翰捷如飛明朝伏闕下儒冠翕相隨种李奪兵權憤痛社稷危抱書再詣闕慟哭聲猶悲天意難遽回人心闕離時雍恣凶暴縱兵欲屠之馬前森利刃此時命埀絲要領兩不顧相視情怡怡虎口僅獲脫好爵安能縻俄起故鄉情各歸天一涯壯哉歐陽生捨生誠所宜聖主圖興復忠誠䝉誅夷宸心頃自責疏節録其遺君乎死不亡泉壤增光輝魂氣鍾慶雲體魄蒸靈芝言言英烈在昭昭星斗埀蘭死則留芳豹死則留皮男兒倘得死其死甘如飴君死逾生榮我生歎奚為九原如可作微君誰與歸杜門故人方謝客為問意如何午枕清風足夜窗明月多易招惟酒聖難遣是詩魔一榻君家事何妨獨我過七夕天道杳難憑人言殊不經佳期傳七夕歡事汚雙星女騃占蛛巧兒癡托鵲靈吾詩非好詆聊與訂頑冥夢遊故山風際氅披鶴雲根杖策鳩幽棲知好在歸夢故難留山放數峯出泉分一派流把茅何日辦縳屋護松楸送元大但得身長健何妨鬢已華胸中翻錦繡筆下走龍蛇作掾只三語讀書空五車卷懷良得計去去臥煙霞辭餽金頃罷官臨慶士民丐留不果乃相與持金贐行勤勤之意既不可却復不當受因請買書郡庠以遺學者作詩謝劉君政成闕闔境歡謡騰載道民不見吏犬無聲持以百錢勤父老嗟我官卑志未伸於人何德人稱好騰牒當途願丐留餽贐交馳雜金寶天涯百指携空囊號寒啼飢日相惱可取無取未傷亷為念易汙惟皓皓不如買書惠泮宫聊助賢侯采芹藻别後青襟倘見思窗前黃卷冝探討水漲謝邑宰送米心知一字不堪煮矻矻窮年黃卷中食粥由來未為過儲瓶况乃嗟屢空令君好賢嫓韓愈賤子受賜慙盧同春水從教繞舍北癡兒不復啼門東中秋月繡江容州水也再見中秋月歲去月圓人尚缺相望千里共嬋娟苦恨亭亭照離别今夕一尊誰與同孟光舉案對梁鴻衆雛立侍儼成列以次持杯夀乃翁乃翁看月揩病目手足頑麻頭髮秃但願團圞三十秋不計東西與南北臨别示子不能枉道取富貴是致爾輩愁飢寒頻年别離情更惡兩地狼狽心何安從人數寄安否問使我相思懷抱寬平生竊嘆曹家兒臨岐莫墮雙闌干乞米臣飢欲死侏儒飽方朔誰憐是歲星館下諸生笑豐暖江頭漁父誚清醒魯公已作乞米帖陶令旋尋儲粟瓶親舊依然眼相向故應特地為吾青覔蠧椽雪寒官冷家乏薪炭與舒丞懇令長至劈酒槽可笑亦可憫也顧影低佪祗自憐怕寒時聳作詩肩全家食粥已數月坐客無氊今幾年君劈槽燒當止酒我和琴爨况無絃雪中送炭從來事况爾羈躬覔蠧椽小原欲歸潮頰香醪暈醉紅鐙敲歸路勒青驄水涵萬頃曽孫稼月逗盈襟少女風大誤平生緣畫足無聊中夜祗書空擬將方宇難論事直扣天門問化工立冬道中黃茅時節瘴煙濃人在山凹第幾重梁竦負才徒感慨嵇康賦性本疏慵此生自斷天休問吾道頻年世不容㑹脫幘巾還自隱鹿門妻子慣相從言懷歸去東皋獨荷犁筆牀書卷有兒持一無可意身將老百不如人心自知夢寐摩娑元結頌經從省憶少陵詩體膚餓盡天應錯依舊臞然山澤姿塞雁南飛度戍樓一聲天地有餘秋家連滄海難窮目人在蠻荒欲盡頭莫效涓埃禆國計况無毛髮為身謀所須菽水能多少蹤跡飄然不繫舟病中雜興溶溶瘴霧暗朝暾咫尺山關號鬼門疾病年年不相貸朱顔凋盡赤心存埀老飄零萬里餘肌膚瘦盡鬢毛疏皇恩若許歸山去豆地雖存不解鋤不羡雲霄欲網羅百年人物總相磨死如歸耳生如寄造物從今奈我何九死窮荒一病翁曉來猶怯北窗風誰知葵藿傾心切待到日輪升太空不辭南北嘆飄零俯仰乾坤一草亭鳶墮水中從沓沓鴻飛天外自冥冥長袖深藏批敕手短笻斜倚作詩肩有時極目愧遼漢興在孤鴻落照邊病損腰圍減未休二毛埀領颯先秋夢中那復化為蝶林下不妨問鬬牛口腹相煎亦可羞飢來欲食飽還憂一編地下我無用須學留侯辟穀不東溪集卷上
