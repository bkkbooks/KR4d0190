body:
  text: 東溪集别集類三宋提要臣等謹按東溪集二卷宋髙登撰登字彥先號東溪漳浦人宣和間為太學生後值靖康之禍登與陳東等伏闕上書請誅蔡京童貫等六賊而用李綱种師道㑹欽宗方擢吳敏張邦昌為相又將起用李邦彥登又上書力爭紹興二年舉于禮部以廷對過于切直僅授富川簿調古縣令時胡舜陟帥靜江欲為秦檜父立祠登持不可為舜陟誣搆逮治適舜陟敗得減死謫容州按宋史本傳載登卒後二十年丞相梁克家及漳守何萬言諸朝追復迪功郎後十年朱熹為守復奏乞褒録贈承務郎今考朱子奏狀謂克家始援紹興赦書以請有司拘文廢格不行近嵗傅伯夀又奏如前狀未奉進止使登抱恨終身埀五十年姓名猶在罪籍云云以此觀之宋史為誤又按書録解題東溪集條下稱迪功郎髙登撰則知登之進贈無承務郎之稱而所謂迪功郎非克家時追復蓋明甚矣又宋史載登五上書不報後因謀南歸忽聞邦昌等各與逺郡一時小人相繼罷斥與所言偶合者十七八登喜復為書論吳敏未罷不報據此則五書之外當更有一書矣今閲集中所載則此事即五書中之第四書書首所叙方圖南下諸語甚為分明此尤足證宋史之貿亂失實也至如紹興八年上皇帝書乃召赴都堂時與時議六篇先後同上者據宋史作萬言疏而集中寥寥五百餘字其詞氣頗有不可相屬者此則集本傳鈔所脫非史之誤矣登之遺集文獻通考作二十卷書録解題及宋史藝文志俱云十二卷此本為明林希元所編僅分上下二卷書疏論議辨說等作共二十篇詩三十一首贊五首針銘二十六首詞十二首啓二首末有附録一卷則朱子褒録奏狀祠堂記兩篇及言行録十條史稱所上時議六篇僅存其序所上五書已亡其一又言行録載紹興元年上駐蹕臨安公以十事投時相者集中亦無之蓋已全非其舊然亡佚者雖多而讀其遺篇尚想見忠義之概即如命子名字說云痛念王室陵遲思扶持而一振之左右匡拂以守鴻業此志未遂命汝曰扶曰持曰振曰拂其勉效兩全之節蓋其忠君愛國之心每飯不忘如此朱子謂能使人聞風興起良不虛云乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東溪集序東溪髙氏奮自南服值宋中造金人難作國如纍卵始以太學生上書言國事觸諱忌冒斧鉞頻頻懇懇不休忠肝義膽已畢露於未仕之先矣既任職居官時時與長上爭可否不為茍從典學慮囚賑荒所在流惠澤民攀轍願留不可得豈茍食人祿者哉六篇時藝簡在帝心一忤權璫遂沉卑仕始以不祠秦父受捃托中以羞見權臣被摶執卒以譏詛失官蓋在南宋始終以秦檜壞事東溪始終與秦為仇敵雖屢經摧折顛沛流離曽不肯稍強顏于秦以安其身志士仁人忠在國家恨不能斷賊臣頭以甘心曽一身利害之恤耶舜陟取媚太師覬躋通顯迄灾弗逮人而自及天道昭昭庸非永鑒夫子忠義出諸肺腑殆不以隱顯死生易志慮君子曰無為而為善觀其謫居授徒家事一不介意拳拳焉唯國之恤臨卒所言猶不忘天下其生平概可知矣所著有東溪集行世豫讀其傳見其為人心竊慕焉往得其集於留都思刻之以語漳節推黃子以方以方曰我責也取歸刻之以方失得不動心在官必行其志如其人斯集之刻詎偶然也與哉自夫子沒後二十年丞相梁克家漳守何萬上之朝復其官後五十年守朱文公熹奏贈其官今三百年後節推又刻其遺文古之君子偃蹇於一時迄伸於百世槩若是原闕
