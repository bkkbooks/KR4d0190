body:
  text: 東溪集附録乞褒録高東溪忠義狀朱子臣猥以微賤備員偏州仰體聖朝收恤褒奬之意思竭駑鈍仰報萬一故於平日聽訟決獄之際不敢不盡其愚今幸踰年目前人戶些少曲直粗得其情獨有事在數十年之前而其枉直之分舉錯之重或非州郡之所得為者則在臣之職不敢不具以聞伏惟聖意特垂聽察臣伏見本漳州人故迪功郎髙登資稟忠義氣節孤高少遊太學值靖康之禍與陳東詣闕上書力陳六賊之罪且言金人不可和狀至紹興間廷對力陳闕失無所顧避覆試官忌其直舉為下州文學高宗皇帝嘉其忠而收之調靜江府古縣令是時秦檜當國帥臣胡舜陟以其父嘗宰是邑欲為立祠以悅其意而登獨持不可舜陟欲以危法中之召致獄官驗問訊掠訖無罪狀可書後為潮州試官又使諸生論直言不聞之可畏策閩浙水沴之所由檜聞益怒以為隂附趙鼎削官徙容州以死檜沒之後諸以口語為檜所陷者高宗皇帝深察其寃巨細存亡無不甄録而登以逺下人士獨無為言之者至乾道間近臣梁克家等始援紹興二十六年赦書以請而有司拘文廢格不下近歲守臣傅伯壽又嘗具奏如前然今亦已踰年未奉進止是使登以抱恨終身埀五十年而姓名猶在罪籍未蒙昭洗雖其孤忠自信獨立不懼精爽凜然必不以此為悔而在聖朝伸寃雪枉勸善懲惡之意則議者猶竊恨焉臣幸得蒙恩假守其鄉目覩茲事若又緘默不能具以上聞則雖萬被誅戮不足償罪是以敢冒言之伏惟陛下御極以來虛心克已容納盡言竊揆聖志如登之忠直宜在矜奬欲望特發德音復其官秩略加褒録以慰九泉且使天下之欲為忠義者知有所勸誠非小補焉髙東溪先生祠記朱子孟子曰聖人百世之師也伯夷柳下惠是也故聞伯夷之風者頑夫亷懦夫有立志聞栁下惠之風者鄙夫寬薄夫敦奮乎百世之上百世之下聞者莫不興起也夫孟子之於二子其論之詳矣雖或以為聖之清或以為聖之和然又嘗病其隘與不恭且以其道不同於孔子而不願學也及其一旦發為此言乃以百世之師歸之而孔子反不與焉何哉孔子之道大德中而無迹故學之者沒身鑽仰而不足二子志潔行髙而迹著故慕之者一日感慨而有餘也然則二子之功誠不為小而孟子之意其亦可知矣臨漳有東溪先生髙公名登字彥先靖康間逰太學與陳公少陽伏闕拜疏以誅六賊召种李為請用事者欲兵之不為兵也紹興初召主政事堂又與宰相秦檜論不合去為靜江府古縣令有異政帥守希檜意捃其過以屬吏會帥亦以讒死獄中乃得釋被檄試進士潮州使諸生論直言不聞之可畏策閩浙水沴之所由而遂投檄以歸檜聞大怒奪官徙容州公學博行髙議論慷慨口講指畫終日衮衮無非忠臣孝子之言舍生取義之意聞者凛凛然魄動神竦其在古縣學者已爭歸之至是生徒日益盛屬疾作自作埋銘召所與遊及諸生訣别正坐拱手奮髯張目而逝嗚呼是亦可謂一世之人豪矣雖其所學所行未盡合於孔子然其志行之卓然亦足以為聖者之清而使百世之下聞其風者有亷頑立懦之操則其有功於世教豈可與夫隱忍回互以濟其私而自托於孔子之中行者同日而語哉公殁之後三十年延平田君淡為郡博士乃始求其文刻之方版又肖公像而奉祀之以風勵其學者於是郡人王君遇來求文以為記屬豫病未及為而闕今太守永嘉林侯元仲至則又與王君更以闕趣不置豫推高公孤髙之節既如彼而諸賢闕立之意又如此則豫文之陋誠不宜久以疾病為辭起書之辭不達意林侯試為刻之陷置祠壁漳之學子與凡四方之士往來而有事於此者讀之果能有所感慨而興起乎哉淳熙丁未九月甲寅新安朱熹記東溪高先生言行録髙先生諱登字彥先漳浦人宣和間為太學生紹興元年正召名初調賀州富川簿再調靜江府古縣令後奪官竄容州卒公生十一嵗而孤讀書日誦數千言及長究及禮義持身勵行既冠遊太學交遊皆一時之彥靖康中兵入京師六館之士皆遁去公曰君在可去乎與陳東等詣闕上書乞斬六賊時廷臣復建和議割三關奪李綱等兵權軍民不期而會者數萬王時雍縱兵欲殱之公等十人屹立不動時方擢吳敏張邦昌為相敏又言前相李邦彥無辜乞復用公於二月十六日詣登聞檢院上書不報於二十二日又上書又不報繼是凡五上皆不報紹興二年上駐蹕臨安公以十事投時相不行遂於廷對盡言之初考官林叔豹得之喜曰非巍科莫處之覆考官忌其直列作文紕謬與陳之茂等一十九人授下州文學尋有旨附第五甲公任富川簿憲使聞其名檄讞昭賀廣藤潯梧獄尋攝賀州獄事有囚殺人甚明守欲奏裁曰隂德可為公曰隂德豈可曲為之殺人者死而可幸免則被殺之寃何時而銷秩滿士民相率餽金太守勸其受公辭之不可遂請置書藏於學紹興八年赴都堂審察遂上皇帝書及時議六篇并序上覽之索六議送中書檜怒其議已不復以聞授靜江府古縣令公至靜江府帥沈敏曰何以治古縣公條十餘事沈曰是古人之政今人之詐恐不可對曰忠信可行蠻貊謂不能行是誠不至耳但某不差人下鄉亦願公不差人下邑沈曰謹受教公以亷勤公仁四字自誓寬期限以追呼新黌宫以勸學吏無所容其欺風化盛行不嚴而治縣有豪民秦琥習惡怙財縣官悉為所制一日琥乘間言及公事公不從琥宣言縣令止有一年半汝不知古縣有秦大蟲耶會後有訟琥者公申郡及諸司以置於法琥不勝其忿以死行道之人莫不欣悅時胡舜陟帥靜江謂公曰古縣秦太師之父舊治太師生焉宜立祠公曰檜為相無狀祠不可立胡拂然曰汝欲為好人耶公母病甚申乞尋醫不待報檜怒奏請旨諸路提刑根捉送靜江府勘舜陟徑遣健卒至漳浦捕公時太夫人已死舟中公聞有捕命即殯水次屬之家人航海詣闕上書求納官贖罪以終喪上覽而憫之送中書施行公友人有為右師者謂公曰丞相云嘗識君於上庠倘一見之終身事無憂矣上書徒爾也公曰某知有君父而不知有權臣既而中書奏無納官例送理寺下靜江府勘所舜陟先以事下獄死矣事得白以聞敕還家公至廣漕司辟攝歸善令其秋試潮州公憤權臣專恣出題皆托經史語以諷題目出直言不聞深可畏丞相趙鼎時在潮謂公曰天下主試者多矣未有如公忠誠愛君者留終日郡守即馳以達檜檜令理寺坐以舜陟所奏且奏云雖屢經赦宥然情重法輕取特旨編管容州自是天下以言為諱南省至揭公名以為考官戒初公出朝陽試院遂歸舊隱與學者講論忽州遣使臣謝大作持省符至公讀畢即拜謝上馬謝曰少立告家人無害也公曰君命不敢稽遲著鞭而行謝愕然比夜巡檢領百人復至兵刃森列公曰朝廷若賜死亦當拜敕而後就法謝感公忠義為之泣下以死捍之公至容州種蔬植竹為終焉之計四方士執經者數百人公講中庸大學之道方教行窮徼而薨矣是歲紹興戊辰也先是三月朔公得寒熱疾吟詩曰瘴侵玉骨終難起魂斷巫山永不歸閏八月初三日公口誦埋銘與通守黃勳曰耳聵目昏顔凋髮秃有兒歸葬蟠山之麓藏焉息焉以坦我腹公命其子扶執筆寫帖子榜廳事曰奉先王遺訓不受僧道紙薦又命斂以深衣幅巾大帶語出處行藏及天下大計凡數百言不一及其私也公又謂扶曰我死在明日申刻至期屏去妻子焚香端坐正中整襟拱手瞪目鬚髯開張溘然而逝時及申矣有星如火自寢室飛出向西沖天而去鄰舍及左右皆見之驚呼聲振閭里學生林棹為敘其出處楊汝南陳景肅皆師之淡菴胡銓為作忠辨晦菴朱文公守漳日為祠堂記紹興辛亥文公復請於朝褒録忠義東溪集附録
